<!DOCTYPE html>
<html lang="en"
xmlns: th="http://www.thymeleaf.org">
<head>
    <title>signup</title>
    <link rel="stylesheet" th:href="@{css\style.css}">
</head>

<body>


<div class="login-container">
    <form action="/signup" method="post" class="login-box">
    <h2>Create Account</h2>

    <br>
    <input type="text"
           name="username"
           placeholder="Enter Username">
    <input type="password"
           name="password"
           placeholder="Enter Password">


    <button type="submit">
        Signup
    </button>


<br>
        <p th:text="${error}"
           style="color: red;">
        </p>

<a href="/login">Already have account? Login</a>

</form>
</div>

</body>

</html>
